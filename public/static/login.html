<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexSpark</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Rajdhani', 'sans-serif'],
              header: ['Antonio', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              nexspark: {
                bg: '#000000',
                gold: '#FF9C00',
                pale: '#FFCC99',
                red: '#CC3333',
                blue: '#99CCFF',
                purple: '#CC99CC',
                dark: '#111111',
                panel: 'rgba(20, 20, 25, 0.9)'
              }
            }
          }
        }
      }
    </script>

    <style>
      body {
        background-color: #000000;
        color: #99CCFF;
        overflow-x: hidden;
      }

      .lcars-btn {
        text-transform: uppercase;
        letter-spacing: 2px;
        font-family: 'Antonio', sans-serif;
        font-weight: 700;
        transition: all 0.2s;
      }

      .lcars-btn:hover {
        filter: brightness(1.2);
      }

      input {
        background: rgba(153, 204, 255, 0.05);
        border: 2px solid rgba(153, 204, 255, 0.3);
        color: #fff;
        font-family: 'JetBrains Mono', monospace;
      }

      input:focus {
        outline: none;
        border-color: #FF9C00;
        background: rgba(255, 156, 0, 0.1);
      }
    </style>
</head>
<body class="relative">
    <!-- Animated Background -->
    <canvas id="bgCanvas" class="fixed top-0 left-0 w-full h-full pointer-events-none z-0"></canvas>

    <!-- Main Container -->
    <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full">

            <!-- Logo -->
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-2 bg-white rounded-full px-6 py-3 mb-4">
                    <i class="fas fa-bolt text-3xl text-yellow-500"></i>
                    <span class="font-header font-bold text-2xl text-black">NEXSPARK</span>
                </div>
                <h1 class="text-4xl font-header font-bold text-nexspark-gold mb-2">LOGIN</h1>
                <p class="text-nexspark-blue font-mono text-sm">Access your growth dashboard</p>
            </div>

            <!-- Login Panel -->
            <div class="bg-nexspark-panel border-2 border-nexspark-gold rounded-2xl p-8 backdrop-blur-xl">

                <!-- Error Message -->
                <div id="errorMessage" class="hidden mb-6 bg-nexspark-red/20 border-2 border-nexspark-red rounded-lg p-4">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-exclamation-circle text-nexspark-red"></i>
                        <span id="errorText" class="text-white font-mono text-sm"></span>
                    </div>
                </div>

                <!-- Email/Password Form -->
                <form id="loginForm" class="space-y-6 mb-6">
                    <div>
                        <label class="block text-nexspark-blue font-mono text-sm mb-2 uppercase">
                            <i class="fas fa-envelope mr-2"></i>Email
                        </label>
                        <input
                            type="email"
                            id="emailInput"
                            required
                            class="w-full px-4 py-3 rounded-lg"
                            placeholder="your@email.com"
                        >
                    </div>

                    <div>
                        <label class="block text-nexspark-blue font-mono text-sm mb-2 uppercase">
                            <i class="fas fa-lock mr-2"></i>Password
                        </label>
                        <input
                            type="password"
                            id="passwordInput"
                            required
                            minlength="8"
                            class="w-full px-4 py-3 rounded-lg"
                            placeholder="••••••••"
                        >
                    </div>

                    <button
                        type="submit"
                        class="w-full lcars-btn bg-nexspark-gold hover:bg-nexspark-pale text-black font-bold py-4 rounded-lg text-xl"
                    >
                        <i class="fas fa-sign-in-alt mr-2"></i>LOGIN
                    </button>
                </form>

                <!-- Divider -->
                <div class="flex items-center gap-4 mb-6">
                    <div class="flex-1 h-px bg-nexspark-blue/30"></div>
                    <span class="text-nexspark-blue/50 font-mono text-xs uppercase">Or</span>
                    <div class="flex-1 h-px bg-nexspark-blue/30"></div>
                </div>

                <!-- Google OAuth Button -->
                <button
                    onclick="window.location.href='/auth/google'"
                    class="w-full lcars-btn bg-white hover:bg-gray-100 text-black font-bold py-4 rounded-lg text-lg mb-6 flex items-center justify-center gap-3"
                >
                    <svg class="w-6 h-6" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Sign in with Google
                </button>

                <!-- Register Link -->
                <div class="text-center">
                    <span class="text-white/50 font-mono text-sm">Don't have an account? </span>
                    <a href="/static/register.html" class="text-nexspark-gold font-mono text-sm hover:text-nexspark-pale">
                        Sign up here
                    </a>
                </div>

            </div>

            <!-- Back to Home -->
            <div class="text-center mt-6">
                <a href="/" class="text-nexspark-blue/70 hover:text-nexspark-blue font-mono text-sm">
                    <i class="fas fa-arrow-left mr-2"></i>Back to Home
                </a>
            </div>

        </div>
    </div>

    <!-- Background Animation Script -->
    <script>
    (() => {
      const canvas = document.getElementById('bgCanvas');
      if (!canvas) return;

      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      const stars = Array.from({ length: 800 }, () => ({
        x: Math.random() * canvas.width - canvas.width / 2,
        y: Math.random() * canvas.height - canvas.height / 2,
        z: Math.random() * 1000,
        color: ['#FF9C00', '#99CCFF', '#CC99CC', '#FFFFFF'][Math.floor(Math.random() * 4)]
      }));

      function animate() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        stars.forEach(star => {
          star.z -= 2;
          if (star.z <= 0) {
            star.z = 1000;
            star.x = Math.random() * canvas.width - centerX;
            star.y = Math.random() * canvas.height - centerY;
          }

          const scale = 1000 / star.z;
          const x = centerX + star.x * scale;
          const y = centerY + star.y * scale;
          const size = Math.max(0, (1 - star.z / 1000) * 3);

          ctx.fillStyle = star.color;
          ctx.beginPath();
          ctx.arc(x, y, size, 0, Math.PI * 2);
          ctx.fill();
        });

        requestAnimationFrame(animate);
      }

      animate();

      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    })();

    // Login Form Handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;

      // Hide previous error
      document.getElementById('errorMessage').classList.add('hidden');

      // Show loading state
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const originalText = submitBtn.innerHTML;
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>LOGGING IN...';
      submitBtn.disabled = true;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (data.success) {
          // Store user and session token
          localStorage.setItem('nexspark_user', JSON.stringify(data.user));
          localStorage.setItem('nexspark_session', data.sessionToken);

          console.log('✅ Login successful');

          // Redirect to dashboard
          window.location.href = '/dashboard';
        } else {
          // Show error
          document.getElementById('errorText').textContent = data.message || 'Login failed';
          document.getElementById('errorMessage').classList.remove('hidden');

          submitBtn.innerHTML = originalText;
          submitBtn.disabled = false;
        }
      } catch (error) {
        console.error('Login error:', error);
        document.getElementById('errorText').textContent = 'Network error. Please try again.';
        document.getElementById('errorMessage').classList.remove('hidden');

        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }
    });
    </script>

    <script src="/static/modal-utils.js"></script>
</body>
</html>
