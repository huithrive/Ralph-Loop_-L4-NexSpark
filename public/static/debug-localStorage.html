<!DOCTYPE html>
<html>
<head>
    <title>Debug localStorage</title>
    <style>
        body { 
            font-family: monospace; 
            padding: 20px; 
            background: #000; 
            color: #0f0;
        }
        pre { 
            background: #111; 
            padding: 15px; 
            border: 1px solid #0f0;
            overflow-x: auto;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>🔍 localStorage Debug Tool</h1>
    
    <button onclick="checkData()">Check Data</button>
    <button onclick="fixInterviewId()">Fix Interview ID</button>
    <button onclick="clearAll()">Clear All Data</button>
    
    <h2>User Data:</h2>
    <pre id="user"></pre>
    
    <h2>Interview Data:</h2>
    <pre id="interview"></pre>
    
    <h2>All localStorage Keys:</h2>
    <pre id="all"></pre>
    
    <script>
        function checkData() {
            const user = localStorage.getItem('nexspark_user');
            const interview = localStorage.getItem('nexspark_interview');
            
            document.getElementById('user').textContent = user ? JSON.stringify(JSON.parse(user), null, 2) : 'NOT FOUND';
            document.getElementById('interview').textContent = interview ? JSON.stringify(JSON.parse(interview), null, 2) : 'NOT FOUND';
            
            const allKeys = Object.keys(localStorage);
            document.getElementById('all').textContent = allKeys.length > 0 ? allKeys.join('\n') : 'No keys found';
        }
        
        function fixInterviewId() {
            const interview = localStorage.getItem('nexspark_interview');
            if (interview) {
                const data = JSON.parse(interview);
                if (!data.id) {
                    data.id = 'fixed_' + Date.now();
                    data.interviewId = data.id;
                    localStorage.setItem('nexspark_interview', JSON.stringify(data));
                    alert('✅ Added interview ID: ' + data.id);
                    checkData();
                } else {
                    alert('✅ Interview ID already exists: ' + data.id);
                }
            } else {
                alert('❌ No interview found in localStorage');
            }
        }
        
        function clearAll() {
            if (confirm('Clear all localStorage data?')) {
                localStorage.clear();
                alert('✅ Cleared!');
                checkData();
            }
        }
        
        // Auto-check on load
        checkData();
    </script>
</body>
</html>
