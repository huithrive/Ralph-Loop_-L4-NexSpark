<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Growth Strategy Report | NexSpark</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #reportFrame {
            width: 100%;
            height: 100vh;
            border: none;
        }
        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #000;
            border-bottom: 2px solid #FF9C00;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        #toolbar button {
            background: #FF9C00;
            color: #000;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        #toolbar button:hover {
            background: #FFCC99;
        }
        #reportContainer {
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <div style="color: #FF9C00; font-weight: bold; font-size: 18px;">
            <i class="fas fa-bolt"></i> NEXSPARK REPORT
        </div>
        <div style="display: flex; gap: 12px;">
            <button onclick="downloadReport()">
                <i class="fas fa-download"></i> Download
            </button>
            <button onclick="window.close()" style="background: #666;">
                <i class="fas fa-times"></i> Close
            </button>
        </div>
    </div>

    <div id="reportContainer"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const reportId = urlParams.get('reportId');

        async function loadReport() {
            try {
                const response = await fetch(`/api/report/${reportId}`);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.message);
                }

                document.getElementById('reportContainer').innerHTML = data.report.html_report;

            } catch (error) {
                document.getElementById('reportContainer').innerHTML = `
                    <div style="text-align: center; padding: 100px; color: #999;">
                        <h2>Failed to load report</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function downloadReport() {
            try {
                const response = await fetch(`/api/report/${reportId}`);
                const data = await response.json();

                const blob = new Blob([data.report.html_report], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `nexspark-report-${data.report.brand_name || 'report'}-${Date.now()}.html`;
                a.click();
                URL.revokeObjectURL(url);

            } catch (error) {
                alert('Download failed: ' + error.message);
            }
        }

        loadReport();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</body>
</html>
