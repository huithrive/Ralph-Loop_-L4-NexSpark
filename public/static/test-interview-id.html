<!DOCTYPE html>
<html>
<head>
    <title>Interview ID Test</title>
</head>
<body>
    <h1>Interview ID Diagnostic</h1>
    <button onclick="checkInterview()">Check Interview Data</button>
    <pre id="output"></pre>
    
    <script>
        function checkInterview() {
            const user = JSON.parse(localStorage.getItem('nexspark_user') || '{}');
            const interview = JSON.parse(localStorage.getItem('nexspark_interview') || '{}');
            
            const output = document.getElementById('output');
            output.textContent = JSON.stringify({
                user: user,
                interview: interview,
                hasUserId: !!user.id,
                hasInterviewId: !!interview.id,
                hasInterviewIdAlt: !!interview.interviewId
            }, null, 2);
        }
    </script>
</body>
</html>
