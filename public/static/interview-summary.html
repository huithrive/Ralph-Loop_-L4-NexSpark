<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Summary - NexSpark Growth OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'Space Mono', monospace;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f3a 100%);
            color: white;
            min-height: 100vh;
        }
        
        .font-header {
            font-family: 'Orbitron', sans-serif;
        }
        
        .nexspark-gold { color: #FF9C00; }
        .nexspark-blue { color: #99CCFF; }
        .nexspark-purple { color: #CC99CC; }
        .nexspark-panel { background: rgba(26, 31, 58, 0.8); }
        .nexspark-dark { background: rgba(10, 14, 26, 0.9); }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .animate-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        .loading-spinner {
            border: 3px solid rgba(255, 156, 0, 0.3);
            border-top-color: #FF9C00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Editable field styles */
        .editable-field {
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 4px;
            padding: 4px 8px;
            margin: -4px -8px;
        }
        
        .editable-field:hover {
            background: rgba(255, 156, 0, 0.1);
            border: 1px dashed #FF9C00;
        }
        
        .edit-input {
            width: 100%;
            background: rgba(255, 156, 0, 0.05);
            border: 2px solid #FF9C00;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: 'Space Mono', monospace;
            font-size: inherit;
        }
        
        .edit-input:focus {
            outline: none;
            background: rgba(255, 156, 0, 0.1);
        }
        
        .edit-controls {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }
    </style>
</head>
<body class="p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="mb-8 text-center">
            <h1 class="text-4xl font-header font-bold text-nexspark-gold uppercase tracking-wider mb-2">
                <i class="fas fa-check-circle mr-3"></i>Interview Summary
            </h1>
            <p class="text-nexspark-blue font-mono text-lg">
                Let me confirm what I understood from our conversation...
            </p>
        </div>
        
        <!-- Loading State -->
        <div id="loadingState" class="nexspark-panel border-2 border-nexspark-purple rounded-xl p-12 text-center">
            <div class="loading-spinner mx-auto mb-4"></div>
            <p class="text-white font-mono text-lg mb-2">
                <i class="fas fa-brain mr-2"></i>NexSpark AI analyzing your responses...
            </p>
            <p class="text-white/60 text-sm">
                This will take just a moment
            </p>
        </div>
        
        <!-- Summary Display (Hidden initially) -->
        <div id="summaryDisplay" class="hidden">
            <!-- Summary Content -->
            <div class="nexspark-panel border-2 border-nexspark-gold rounded-xl p-8 mb-6">
                <h2 class="text-2xl font-header font-bold text-nexspark-gold uppercase mb-6">
                    <i class="fas fa-clipboard-check mr-2"></i>Your Business Summary
                </h2>
                
                <div id="summaryContent" class="space-y-6">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
            
            <!-- Confirmation Buttons -->
            <div class="flex gap-4 justify-center">
                <button id="confirmBtn" class="px-8 py-4 bg-nexspark-gold text-black font-header font-bold text-lg uppercase rounded-lg hover:bg-yellow-500 transition-all transform hover:scale-105">
                    <i class="fas fa-check mr-2"></i>Yes, This is Accurate
                </button>
                <button id="editBtn" class="px-8 py-4 bg-nexspark-purple text-white font-header font-bold text-lg uppercase rounded-lg hover:bg-purple-600 transition-all">
                    <i class="fas fa-edit mr-2"></i>Let Me Edit
                </button>
            </div>
        </div>
        
        <!-- Error State (Hidden initially) -->
        <div id="errorState" class="hidden nexspark-panel border-2 border-red-500 rounded-xl p-8 text-center">
            <i class="fas fa-exclamation-triangle text-5xl text-red-500 mb-4"></i>
            <h3 class="text-2xl font-header font-bold text-white mb-2">Something went wrong</h3>
            <p class="text-white/70 mb-6" id="errorMessage"></p>
            <button onclick="location.reload()" class="px-6 py-3 bg-nexspark-gold text-black font-header font-bold uppercase rounded-lg">
                <i class="fas fa-redo mr-2"></i>Try Again
            </button>
        </div>
    </div>
    
    <script>
        // Check authentication
        function checkAuth() {
            const user = localStorage.getItem('nexspark_user');
            if (!user) {
                console.log('No user found, redirecting to home');
                window.location.href = '/';
                return null;
            }
            return JSON.parse(user);
        }
        
        // Get interview data from localStorage
        function getInterviewData() {
            const interview = localStorage.getItem('nexspark_interview');
            if (!interview) {
                console.error('No interview data found');
                return null;
            }
            return JSON.parse(interview);
        }
        
        // Display summary in a structured format
        function displaySummary(summary) {
            const summaryContent = document.getElementById('summaryContent');
            
            summaryContent.innerHTML = `
                <div class="mb-4 bg-nexspark-gold/10 border border-nexspark-gold/30 rounded-lg p-4">
                    <div class="flex items-center gap-2 text-nexspark-gold mb-2">
                        <i class="fas fa-edit"></i>
                        <span class="font-bold text-sm">Click any field to edit it</span>
                    </div>
                    <p class="text-white/70 text-xs">You can update any information before proceeding</p>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-gold">
                        <label class="text-nexspark-gold font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-tag mr-2"></i>Brand Name
                        </label>
                        <p class="text-white text-lg editable-field" data-field="brandName" onclick="editField('brandName', this)">${summary.brandName || 'N/A'}</p>
                    </div>
                    
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-blue">
                        <label class="text-nexspark-blue font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-dollar-sign mr-2"></i>Current Revenue
                        </label>
                        <p class="text-white text-lg editable-field" data-field="currentRevenue" onclick="editField('currentRevenue', this)">${summary.currentRevenue || 'N/A'}</p>
                    </div>
                    
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-purple col-span-1 md:col-span-2">
                        <label class="text-nexspark-purple font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-box mr-2"></i>Product Description
                        </label>
                        <p class="text-white editable-field" data-field="productDescription" onclick="editField('productDescription', this)">${summary.productDescription || 'N/A'}</p>
                    </div>
                    
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-gold col-span-1 md:col-span-2">
                        <label class="text-nexspark-gold font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-lightbulb mr-2"></i>Motivation & Story
                        </label>
                        <p class="text-white editable-field" data-field="motivation" onclick="editField('motivation', this)">${summary.motivation || 'N/A'}</p>
                    </div>
                    
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-blue">
                        <label class="text-nexspark-blue font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-chart-line mr-2"></i>Best Channel
                        </label>
                        <p class="text-white editable-field" data-field="bestChannel" onclick="editField('bestChannel', this)">${summary.bestChannel || 'N/A'}</p>
                    </div>
                    
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-purple">
                        <label class="text-nexspark-purple font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-exclamation-circle mr-2"></i>Biggest Challenge
                        </label>
                        <p class="text-white editable-field" data-field="biggestChallenge" onclick="editField('biggestChallenge', this)">${summary.biggestChallenge || 'N/A'}</p>
                    </div>
                    
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-gold col-span-1 md:col-span-2">
                        <label class="text-nexspark-gold font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-users mr-2"></i>Ideal Customer
                        </label>
                        <p class="text-white editable-field" data-field="idealCustomer" onclick="editField('idealCustomer', this)">${summary.idealCustomer || 'N/A'}</p>
                    </div>
                    
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-blue">
                        <label class="text-nexspark-blue font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-bullseye mr-2"></i>6-Month Goal
                        </label>
                        <p class="text-white editable-field" data-field="sixMonthGoal" onclick="editField('sixMonthGoal', this)">${summary.sixMonthGoal || 'N/A'}</p>
                    </div>
                    
                    <div class="nexspark-dark rounded-lg p-4 border-l-4 border-nexspark-purple">
                        <label class="text-nexspark-purple font-bold text-sm uppercase mb-2 block">
                            <i class="fas fa-trophy mr-2"></i>Competitors
                        </label>
                        <p class="text-white editable-field" data-field="competitors" onclick="editField('competitors', this)">${summary.competitors ? summary.competitors.join(', ') : 'N/A'}</p>
                    </div>
                </div>
            `;
            
            // Show summary, hide loading
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('summaryDisplay').classList.remove('hidden');
        }
        
        // Edit field functionality
        let currentEditingField = null;
        
        function editField(fieldName, element) {
            if (currentEditingField) {
                // Cancel previous edit
                cancelEdit();
            }
            
            currentEditingField = fieldName;
            const currentValue = element.textContent;
            const isTextarea = ['productDescription', 'motivation', 'idealCustomer'].includes(fieldName);
            
            // Replace with input
            if (isTextarea) {
                element.innerHTML = `
                    <textarea class="edit-input" rows="3">${currentValue}</textarea>
                    <div class="edit-controls">
                        <button onclick="saveEdit('${fieldName}', this.parentElement.previousElementSibling)" class="px-3 py-1 bg-green-500 text-white rounded text-sm font-bold hover:bg-green-600">
                            <i class="fas fa-check mr-1"></i>Save
                        </button>
                        <button onclick="cancelEdit()" class="px-3 py-1 bg-gray-500 text-white rounded text-sm font-bold hover:bg-gray-600">
                            <i class="fas fa-times mr-1"></i>Cancel
                        </button>
                    </div>
                `;
            } else {
                element.innerHTML = `
                    <input type="text" class="edit-input" value="${currentValue}" />
                    <div class="edit-controls">
                        <button onclick="saveEdit('${fieldName}', this.parentElement.previousElementSibling)" class="px-3 py-1 bg-green-500 text-white rounded text-sm font-bold hover:bg-green-600">
                            <i class="fas fa-check mr-1"></i>Save
                        </button>
                        <button onclick="cancelEdit()" class="px-3 py-1 bg-gray-500 text-white rounded text-sm font-bold hover:bg-gray-600">
                            <i class="fas fa-times mr-1"></i>Cancel
                        </button>
                    </div>
                `;
            }
            
            // Focus on input
            element.querySelector('.edit-input').focus();
            element.querySelector('.edit-input').select();
        }
        
        function saveEdit(fieldName, inputElement) {
            const newValue = inputElement.value.trim();
            
            if (!newValue) {
                alert('Value cannot be empty');
                return;
            }
            
            // Update summary in localStorage
            const summaryData = localStorage.getItem('nexspark_summary');
            const summary = JSON.parse(summaryData);
            
            // Handle competitors specially (convert to array)
            if (fieldName === 'competitors') {
                summary[fieldName] = newValue.split(',').map(c => c.trim()).filter(c => c);
            } else {
                summary[fieldName] = newValue;
            }
            
            localStorage.setItem('nexspark_summary', JSON.stringify(summary));
            
            // Restore display
            const parentElement = inputElement.parentElement;
            if (fieldName === 'competitors') {
                parentElement.innerHTML = summary[fieldName].join(', ');
            } else {
                parentElement.innerHTML = newValue;
            }
            parentElement.className = 'text-white text-lg editable-field';
            parentElement.onclick = function() { editField(fieldName, this); };
            
            currentEditingField = null;
            
            console.log('✅ Updated', fieldName, 'to:', newValue);
        }
        
        function cancelEdit() {
            // Reload the summary to restore original display
            const summaryData = localStorage.getItem('nexspark_summary');
            const summary = JSON.parse(summaryData);
            displaySummary(summary);
            currentEditingField = null;
        }
        
        // Show error
        function showError(message) {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('errorState').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }
        
        // Generate summary using API
        async function generateSummary() {
            try {
                const user = checkAuth();
                if (!user) return;
                
                const interview = getInterviewData();
                if (!interview || !interview.responses) {
                    showError('No interview data found. Please complete the interview first.');
                    return;
                }
                
                console.log('📊 Generating summary with', interview.responses.length, 'responses');
                
                // Get custom prompts if available
                const customPrompts = localStorage.getItem('nexspark_admin_prompts');
                const headers = {};
                if (customPrompts) {
                    headers['X-Custom-Prompts'] = customPrompts;
                    console.log('Using custom prompts from admin panel');
                }
                
                // Call API to generate summary
                const response = await axios.post('/api/interview/summarize', {
                    responses: interview.responses
                }, {
                    headers
                });
                
                if (response.data.success) {
                    const summary = response.data.summary;
                    console.log('✅ Summary generated:', summary);
                    
                    // Save summary to localStorage for next steps
                    localStorage.setItem('nexspark_summary', JSON.stringify(summary));
                    
                    // Display summary
                    displaySummary(summary);
                } else {
                    throw new Error(response.data.message || 'Failed to generate summary');
                }
            } catch (error) {
                console.error('Error generating summary:', error);
                showError(error.message || 'Failed to generate summary. Please try again.');
            }
        }
        
        // Confirm button - proceed directly to preview
        document.getElementById('confirmBtn').addEventListener('click', () => {
            // Redirect directly to preview (skip website confirmation)
            window.location.href = '/report-preview';
        });
        
        // Edit button - go back to interview
        document.getElementById('editBtn').addEventListener('click', () => {
            if (confirm('This will take you back to the interview. Your current responses will be preserved. Continue?')) {
                window.location.href = '/interview';
            }
        });
        
        // Start the process on page load
        window.addEventListener('DOMContentLoaded', generateSummary);
    </script>
</body>
</html>
