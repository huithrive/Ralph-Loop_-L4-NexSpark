<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generating Your Growth Strategy | Auxora</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@400;600;700&family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Rajdhani', 'sans-serif'],
              header: ['Antonio', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              auxora: {
                bg: '#000000',
                gold: '#FF9C00',
                blue: '#99CCFF',
                purple: '#CC99CC',
                dark: '#111111',
              }
            }
          }
        }
      }
    </script>
    
    <style>
      body {
        background: #000000;
        color: #99CCFF;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      .animate-spin-slow {
        animation: spin 3s linear infinite;
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      .animate-pulse-slow {
        animation: pulse 2s ease-in-out infinite;
      }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8">
    <div class="max-w-4xl mx-auto text-center">
        <!-- Loading Spinner -->
        <div class="inline-block mb-8">
            <i class="fas fa-rocket text-auxora-gold text-8xl animate-spin-slow"></i>
        </div>
        
        <!-- Main Message -->
        <h1 class="text-6xl font-header font-bold text-white mb-6">
            Generating Your Growth Strategy
        </h1>
        
        <p class="text-auxora-blue text-2xl font-mono mb-8">
            Claude Opus AI is analyzing your business...
        </p>
        
        <!-- Status Message -->
        <div class="bg-auxora-dark rounded-2xl p-8 border-2 border-auxora-gold/30 inline-block">
            <div id="statusMessage" class="text-white text-xl animate-pulse-slow">
                <i class="fas fa-brain mr-3 text-auxora-purple"></i>
                <span>Generating comprehensive growth strategy with Claude Opus...</span>
            </div>
            <div class="text-white/50 text-sm mt-4">
                <i class="fas fa-info-circle mr-2"></i>
                This may take 30-60 seconds for the most advanced AI analysis
            </div>
        </div>
        
        <!-- Error Display (hidden by default) -->
        <div id="errorContainer" class="hidden mt-8 bg-red-900/20 border-2 border-red-500 rounded-xl p-6">
            <i class="fas fa-exclamation-triangle text-red-500 text-3xl mb-3"></i>
            <div id="errorMessage" class="text-red-400 text-lg"></div>
            <button onclick="window.location.href='/dashboard'" class="mt-4 px-6 py-3 bg-auxora-gold text-black font-bold rounded-lg hover:bg-yellow-500 transition">
                Return to Dashboard
            </button>
        </div>
    </div>

    <script>
        console.log('🚀 Full Report Generation Page Loaded');
        
        // Get data from localStorage
        const user = JSON.parse(localStorage.getItem('auxora_user') || '{}');
        const summary = JSON.parse(localStorage.getItem('auxora_summary') || '{}');
        const interview = JSON.parse(localStorage.getItem('auxora_interview') || '{}');
        const payment = JSON.parse(localStorage.getItem('auxora_payment') || '{}');
        
        console.log('User:', user);
        console.log('Summary:', summary);
        console.log('Payment:', payment);

        // Verify summary exists
        if (!summary || Object.keys(summary).length === 0) {
            console.error('❌ No summary data found!');
            showError('Interview analysis data missing. Please complete the strategy analysis first.');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 3000);
            return;
        }

        // Verify payment
        if (!payment.paid) {
            console.error('❌ No payment found!');
            showError('Payment verification failed. Please complete payment first.');
            setTimeout(() => {
                window.location.href = '/payment';
            }, 3000);
            return;
        }
        
        // Generate report immediately
        generateReport();
        
        async function generateReport() {
            try {
                console.log('📊 Starting report generation with Claude Opus...');
                
                // Update status
                updateStatus('Analyzing your business with Claude Opus...', 'fa-brain');
                
                // Call API to generate report
                const response = await axios.post('/api/report/generate', {
                    summary: summary,
                    competitors: summary.competitors || [],
                    userId: user.email || user.id,
                    interviewId: interview.id || 'interview_' + Date.now()
                });
                
                if (response.data.success) {
                    console.log('✅ Report generated successfully!');
                    
                    // Save report to localStorage
                    localStorage.setItem('auxora_report', JSON.stringify(response.data.report));
                    localStorage.setItem('auxora_report_ready', 'true');
                    localStorage.setItem('auxora_report_timestamp', new Date().toISOString());
                    
                    // Update status
                    updateStatus('Report generated! Redirecting...', 'fa-check-circle');
                    
                    // Redirect to dashboard to view report
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    throw new Error(response.data.message || 'Report generation failed');
                }
                
            } catch (error) {
                console.error('❌ Error generating report:', error);
                showError(
                    error.response?.data?.message || 
                    error.message || 
                    'Failed to generate report. Please try again.'
                );
            }
        }
        
        function updateStatus(message, icon) {
            document.getElementById('statusMessage').innerHTML = `
                <i class="fas ${icon} mr-3 text-auxora-purple"></i>
                <span>${message}</span>
            `;
        }
        
        function showError(message) {
            document.getElementById('errorContainer').classList.remove('hidden');
            document.getElementById('errorMessage').textContent = message;
        }
    </script>
</body>
</html>
